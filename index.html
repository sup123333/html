<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 8.0 Панель меню</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="windows-panel">
        <div class="header">
            <h1>Start</h1>
        </div>
        
        <div class="content">
            <div class="section">
                <h2 class="section-title">Работа</h2>
                <ul class="app-list">
                    <li class="app-item">
                        <i class="icon icon-mail"></i>
                        <span>Почта</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-calendar"></i>
                        <span>Календарь</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-browser"></i>
                        <span>Браузер</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-display"></i>
                        <span>Дисплей</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-help"></i>
                        <span>Помощь</span>
                    </li>
                </ul>
            </div>
            
            <div class="section">
                <h2 class="section-title">Медиа</h2>
                <ul class="app-list">
                    <li class="app-item">
                        <i class="icon icon-photos"></i>
                        <span>Фотографии</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-music"></i>
                        <span>Музыка</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-video"></i>
                        <span>Видео</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-camera"></i>
                        <span>Камера</span>
                    </li>
                </ul>
            </div>
            
            <div class="section">
                <h2 class="section-title">Инструменты</h2>
                <ul class="app-list">
                    <li class="app-item">
                        <i class="icon icon-settings"></i>
                        <span>Настройки</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-store"></i>
                        <span>Магазин</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-games"></i>
                        <span>Игры</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-finance"></i>
                        <span>Финансы</span>
                    </li>
                </ul>
            </div>
            
            <div class="section">
                <h2 class="section-title">Информация</h2>
                <ul class="app-list">
                    <li class="app-item">
                        <i class="icon icon-weather"></i>
                        <span>Погода</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-news"></i>
                        <span>Новости</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-notes"></i>
                        <span>Заметки</span>
                    </li>
                    <li class="app-item">
                        <i class="icon icon-maps"></i>
                        <span>Карты</span>
                    </li>
                </ul>
            </div>
        </div>
        
        <div class="footer">
            <div class="user-info">
                <i class="icon icon-user"></i>
                <span>Пользователь</span>
            </div>
            <div class="time">
                <span>18:18</span>
                <span>27°C</span>
            </div>
        </div>
    </div>
</body>
</html>
